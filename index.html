<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyTube">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com https://www.gstatic.com https://apis.google.com;
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: https://i.ytimg.com https://yt3.ggpht.com https://yt3.googleusercontent.com https://lh3.googleusercontent.com https:;
  connect-src 'self' https://*.googleapis.com https://*.google.com https://www.youtube.com https://api.allorigins.win https://corsproxy.io;
  font-src 'self';
  frame-src https://www.youtube.com https://www.youtube-nocookie.com https://*.firebaseapp.com;">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MyTube - 나만의 유튜브</title>
<style>
/* ============== CSS Variables ============== */
:root {
  --red: #FF0000;
  --red-dark: #CC0000;
  --red-light: #FF4444;
  --red-bg: #FFF0F0;
  --bg: #F9F9F9;
  --card: #FFFFFF;
  --text: #0F0F0F;
  --text-sub: #606060;
  --text-light: #909090;
  --border: #E5E5E5;
  --danger: #E17055;
  --success: #00B894;
  --shadow: 0 1px 6px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --tab-height: 60px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
[data-theme="dark"] {
  --red-bg: #2A1010;
  --bg: #0F0F0F;
  --card: #1A1A1A;
  --text: #F1F1F1;
  --text-sub: #AAAAAA;
  --text-light: #717171;
  --border: #333333;
  --shadow: 0 1px 6px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
}

/* ============== Reset & Base ============== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(var(--tab-height) + 16px);
  transition: background var(--transition), color var(--transition);
  -webkit-tap-highlight-color: transparent;
}

/* ============== Header ============== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-logo { font-size: 22px; font-weight: 800; color: var(--red); }
.header-logo span { color: var(--text); }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition);
}
.header-btn:hover { background: var(--border); }
.auth-avatar { width: 28px; height: 28px; border-radius: 50%; }

/* ============== Sections & Tabs ============== */
.section { display: none; padding: 16px; }
.section.active { display: block; }
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-bar-inner { display: flex; justify-content: space-around; height: var(--tab-height); }
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; background: none; border: none; cursor: pointer;
  color: var(--text-light); font-size: 10px; font-weight: 600;
  transition: color var(--transition);
}
.tab.active { color: var(--red); }
.tab-icon { font-size: 22px; }

/* ============== Cards & Grid ============== */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
}
.video-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.video-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.video-card.watched { opacity: 0.6; }
.video-card .thumb-wrap {
  position: relative; width: 100%; padding-top: 56.25%; overflow: hidden;
  background: #000;
}
.video-card .thumb-wrap img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
}
.video-card .watched-badge {
  position: absolute; top: 6px; right: 6px;
  background: var(--success); color: #fff;
  font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700;
}
.video-card .card-info { padding: 10px; }
.video-card .card-title {
  font-size: 13px; font-weight: 600; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.video-card .card-channel { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
.video-card .card-actions {
  display: flex; gap: 4px; margin-top: 6px;
}
.video-card .card-actions button {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  font-size: 11px; padding: 2px 6px; cursor: pointer; color: var(--text-sub);
}
.video-card .card-actions button:hover { background: var(--border); }

/* ============== Channel List ============== */
.channel-list { display: flex; flex-direction: column; gap: 12px; }
.channel-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: transform 0.2s;
}
.channel-card:hover { transform: translateY(-1px); }
.channel-card img {
  width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
  background: var(--border);
}
.channel-card .ch-info { flex: 1; }
.channel-card .ch-name { font-size: 15px; font-weight: 600; }
.channel-card .ch-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.channel-card .ch-actions { display: flex; gap: 6px; }
.channel-card .ch-actions button {
  background: none; border: none; font-size: 18px; cursor: pointer;
  padding: 4px;
}

/* ============== Channel Videos Overlay ============== */
.channel-videos-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  background: var(--bg);
  overflow-y: auto;
  animation: slideInRight 0.25s ease;
}
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.channel-videos-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.channel-videos-header .back-btn {
  background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text);
}
.channel-videos-header .ch-title { font-size: 16px; font-weight: 700; flex: 1; }
.channel-videos-body { padding: 16px; }

/* ============== Player ============== */
.player-container { max-width: 800px; margin: 0 auto; }
.player-wrap {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; border-radius: var(--radius); overflow: hidden;
}
.player-wrap iframe, .player-wrap #yt-player {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border: none;
}
.player-wrap:-webkit-full-screen { padding-top: 0; border-radius: 0; }
.player-wrap:fullscreen { padding-top: 0; border-radius: 0; }
.player-wrap:-webkit-full-screen iframe,
.player-wrap:-webkit-full-screen #yt-player,
.player-wrap:fullscreen iframe,
.player-wrap:fullscreen #yt-player {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
}
.player-fs-close {
  display: none; position: absolute; top: 12px; right: 12px; z-index: 10;
  background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%;
  width: 36px; height: 36px; font-size: 20px; cursor: pointer;
}
.player-wrap:-webkit-full-screen .player-fs-close,
.player-wrap:fullscreen .player-fs-close { display: flex; align-items: center; justify-content: center; }
.player-placeholder {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #888; font-size: 14px; gap: 12px;
}
.player-placeholder .icon { font-size: 48px; }
.player-info {
  margin-top: 16px; padding: 16px;
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.player-info .p-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
.player-info .p-channel { font-size: 13px; color: var(--text-sub); margin-top: 6px; }
.player-info .p-actions { display: flex; gap: 8px; margin-top: 12px; }

/* ============== Buttons ============== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; border: none; cursor: pointer;
  transition: all var(--transition);
}
.btn-primary { background: var(--red); color: #fff; }
.btn-primary:hover { background: var(--red-dark); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { opacity: 0.8; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-block { width: 100%; }
.btn-danger { background: var(--danger); color: #fff; }

/* ============== FAB ============== */
.fab {
  position: fixed;
  bottom: calc(var(--tab-height) + 20px);
  right: 20px;
  width: 56px; height: 56px;
  background: var(--red); color: #fff;
  border: none; border-radius: 50%;
  font-size: 28px; cursor: pointer;
  box-shadow: 0 4px 12px rgba(255,0,0,0.3);
  z-index: 90;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.fab:hover { transform: scale(1.05); box-shadow: 0 6px 16px rgba(255,0,0,0.4); }

/* ============== Category Chips ============== */
.chip-bar {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chip-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  background: var(--card); color: var(--text-sub);
  border: 1px solid var(--border);
  cursor: pointer; white-space: nowrap;
  transition: all var(--transition);
}
.chip.active { background: var(--text); color: var(--card); border-color: var(--text); }

/* ============== Search ============== */
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 14px; margin-bottom: 12px;
}
.search-bar input {
  flex: 1; border: none; outline: none; background: none;
  font-size: 14px; color: var(--text);
}
.search-bar .clear-btn {
  background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-light);
  display: none;
}
.search-bar .clear-btn.show { display: block; }

/* ============== Modal ============== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px; background: var(--bg);
  color: var(--text); outline: none;
}
.form-group input:focus { border-color: var(--red); }

/* ============== Empty State ============== */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .title { font-size: 16px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
.empty-state .desc { font-size: 13px; line-height: 1.5; }

/* ============== Login Banner ============== */
.login-banner {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.login-banner .info { flex: 1; }
.login-banner .info .title { font-size: 14px; font-weight: 700; }
.login-banner .info .desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* ============== Sync Status ============== */
.sync-status {
  font-size: 11px; color: var(--text-light); display: none;
  align-items: center; gap: 4px;
}
.sync-status.show { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.sync-status .spinner { animation: spin 1s linear infinite; display: inline-block; }

/* ============== PWA Install Banner ============== */
.pwa-install-banner {
  position: fixed; bottom: calc(var(--tab-height) + 8px); left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg);
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  max-width: 360px; width: calc(100% - 32px); z-index: 95;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.pwa-install-banner.show { transform: translateX(-50%) translateY(0); }
.pwa-install-banner .pwa-text { flex: 1; }
.pwa-install-banner .pwa-text .title { font-size: 13px; font-weight: 700; }
.pwa-install-banner .pwa-text .desc { font-size: 11px; color: var(--text-sub); }
.pwa-install-banner .pwa-actions { display: flex; align-items: center; gap: 6px; }
.pwa-install-banner .close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-light); }

/* ============== Settings ============== */
.settings-group { margin-bottom: 20px; }
.settings-group .group-title { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 10px; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.settings-row .label { font-size: 14px; font-weight: 500; }
.settings-row .sublabel { font-size: 12px; color: var(--text-sub); }
.toggle {
  position: relative; width: 44px; height: 24px;
  background: var(--border); border-radius: 12px; cursor: pointer;
  transition: background var(--transition);
}
.toggle.active { background: var(--red); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; transition: transform var(--transition);
}
.toggle.active::after { transform: translateX(20px); }

/* ============== API Key Guide ============== */
.api-guide { font-size: 13px; line-height: 1.6; color: var(--text-sub); }
.api-guide ol { padding-left: 20px; }
.api-guide li { margin-bottom: 6px; }
.api-guide code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.api-guide a { color: var(--red); text-decoration: none; }

/* ============== Channel Search (in modal) ============== */
.modal-tabs {
  display: flex; gap: 0; margin-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
.modal-tab {
  flex: 1; padding: 10px; text-align: center;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: none; border: none; color: var(--text-sub);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition);
}
.modal-tab.active {
  color: var(--red); border-bottom-color: var(--red);
}
.modal-tab-content { display: none; }
.modal-tab-content.active { display: block; }
.ch-search-bar {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.ch-search-bar input {
  flex: 1; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px;
  background: var(--bg); color: var(--text); outline: none;
}
.ch-search-bar input:focus { border-color: var(--red); }
.ch-search-bar button {
  padding: 10px 16px; background: var(--red); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.ch-search-bar button:hover { background: var(--red-dark); }
.ch-search-results {
  max-height: 320px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.ch-search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 10px; border-radius: var(--radius-sm);
  background: var(--bg); cursor: pointer;
  transition: background 0.15s;
}
.ch-search-result:hover { background: var(--border); }
.ch-search-result img {
  width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
  background: var(--border); flex-shrink: 0;
}
.ch-search-result .ch-result-info { flex: 1; min-width: 0; }
.ch-search-result .ch-result-name {
  font-size: 14px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ch-search-result .ch-result-meta {
  font-size: 12px; color: var(--text-sub); margin-top: 2px;
}
.ch-search-result .ch-result-add {
  flex-shrink: 0; padding: 6px 12px;
  background: var(--red); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.ch-search-result .ch-result-add:hover { background: var(--red-dark); }
.ch-search-result .ch-result-added {
  flex-shrink: 0; padding: 6px 12px;
  background: var(--success); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600;
}
.ch-search-loading, .ch-search-empty {
  text-align: center; padding: 24px; color: var(--text-sub); font-size: 13px;
}
.ch-search-loading .spinner {
  display: inline-block; animation: spin 1s linear infinite; margin-bottom: 8px;
  font-size: 20px;
}

/* ============== Player Overlay ============== */
.player-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  background: var(--bg);
  overflow-y: auto;
  animation: slideInRight 0.25s ease;
}
.player-overlay-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.player-overlay-header .back-btn {
  background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text);
}
.player-overlay-header .p-overlay-title { font-size: 16px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-overlay-body { padding: 16px; max-width: 800px; margin: 0 auto; }

/* ============== Transcript Modal ============== */
.transcript-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 250;
  background: var(--bg);
  overflow-y: auto;
  animation: slideInRight 0.25s ease;
}
.transcript-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.transcript-header .back-btn {
  background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text);
}
.transcript-header .t-title { font-size: 16px; font-weight: 700; flex: 1; }
.transcript-body { padding: 16px; max-width: 700px; margin: 0 auto; }
.transcript-line {
  display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 14px; line-height: 1.5;
}
.transcript-line .ts { color: var(--red); font-weight: 600; white-space: nowrap; min-width: 50px; cursor: pointer; }
.transcript-line .ts:hover { text-decoration: underline; }
.transcript-line .txt { flex: 1; color: var(--text); }
.transcript-lang-select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); font-size: 13px;
}

/* ============== Video Meta Info ============== */
.card-meta { font-size: 11px; color: var(--text-light); margin-top: 2px; display: flex; gap: 6px; }

/* ============== Responsive ============== */
@media (min-width: 640px) {
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}
</style>
</head>
<body>

<!-- ============== Header ============== -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">My<span>Tube</span></div>
    <div class="sync-status" id="sync-status">
      <span class="sync-icon"></span>
      <span class="sync-text"></span>
    </div>
  </div>
  <div class="header-right">
    <button class="header-btn" id="search-toggle-btn" onclick="toggleSearchBar()" title="검색">🔍</button>
    <button class="header-btn" onclick="showSettingsModal()" data-i18n-title="header.settings">⚙️</button>
    <button class="header-btn" id="auth-icon" onclick="handleAuthClick()">👤</button>

}

function initDefaultCategories() {

  DEFAULT_CATEGORY_DEFS.forEach(def => {

  });

async function fetchVideoGenre(videoId) {
  const url = 'https://www.youtube.com/watch?v=' + videoId;
  const html = await corsGet(url);
  if (!html) return null;
  // Try "category":"Genre" in ytInitialPlayerResponse
  let m = html.match(/"category"\s*:\s*"([^"]+)"/);
  if (m) {
    // Decode unicode escapes like \u0026 → &
    return m[1].replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
  }
  // Fallback: <meta itemprop="genre" content="...">
  m = html.match(/itemprop="genre"\s+content="([^"]+)"/);
  if (m) return m[1];
  return null;
}

function mapGenreToCategory(genre) {
  if (!genre) return null;
  return YT_GENRE_TO_CATEGORY[genre] || null;
}

async function autoCategorizeVideo(id, videoId) {
  try {
    const genre = await fetchVideoGenre(videoId);
    const catId = mapGenreToCategory(genre);
    if (catId && data.videos[id] && !data.videos[id].categoryId) {
      data.videos[id].categoryId = catId;
      saveData();
      renderVideos();
    }
  } catch(e) { /* ignore */ }
}

async function autoCategorizeChannel(id, channelId) {
  try {
    const rss = await fetchChannelRSS(channelId);
    if (!rss || rss.videos.length === 0) return;
    const genre = await fetchVideoGenre(rss.videos[0].videoId);
    const catId = mapGenreToCategory(genre);
    if (catId && data.channels[id] && !data.channels[id].categoryId) {
      data.channels[id].categoryId = catId;
      saveData();
      renderChannels();
    }
  } catch(e) { /* ignore */ }
}

// ============== Data Persistence ==============
function loadData() {
  try {
    const raw = localStorage.getItem('myTube');
    if (raw) {
      const parsed = JSON.parse(raw);
      data = { ...data, ...parsed };
      if (!data.videos) data.videos = {};
      if (!data.channels) data.channels = {};
      if (!data.categories) data.categories = {};
      if (!data.settings) data.settings = {};
      if (!data.watchLog) data.watchLog = { totalSeconds: 0, channels: {}, videos: {} };
    }
  } catch(e) { console.warn('localStorage load error', e); }
  initDefaultCategories();
}

function saveData() {
  try {
    localStorage.setItem('myTube', JSON.stringify(data));
    if (currentUser) debouncedSync();
  } catch(e) { console.warn('localStorage save error', e); }
}

// Swipe gesture
(function() {
  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    const idx = TAB_ORDER.indexOf(activeTab);
    if (idx === -1) return;
    if (dx < 0 && idx < TAB_ORDER.length - 1) switchTab(TAB_ORDER[idx + 1]);
    if (dx > 0 && idx > 0) switchTab(TAB_ORDER[idx - 1]);
  }, { passive: true });
})();

// ============== YouTube URL Parsing ==============
function parseYouTubeVideoId(url) {
  if (!url) return null;
  url = url.trim();
  let m;
  // youtu.be/ID
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/watch?v=ID
  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/embed/ID
  m = url.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/shorts/ID
  m = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/v/ID
  m = url.match(/youtube\.com\/v\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtube.com/live/ID
  m = url.match(/youtube\.com\/live\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // bare ID (11 chars)
  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
  return null;
}

function parseYouTubeChannelInfo(url) {
  if (!url) return null;
  url = url.trim();
  let m;
  // /channel/UCxxxx
  m = url.match(/youtube\.com\/channel\/(UC[a-zA-Z0-9_-]+)/);
  if (m) return { type: 'id', value: m[1] };
  // /@handle
  m = url.match(/youtube\.com\/@([a-zA-Z0-9_.-]+)/);
  if (m) return { type: 'handle', value: m[1] };
  // /c/name or /user/name
  m = url.match(/youtube\.com\/(?:c|user)\/([a-zA-Z0-9_.-]+)/);
  if (m) return { type: 'custom', value: m[1] };
  // bare @handle
  if (url.startsWith('@')) return { type: 'handle', value: url.substring(1) };
  return null;
}

function addVideoFromUrl(url, categoryId) {
  const videoId = parseYouTubeVideoId(url);
  if (!videoId) {
    showToast(t('videos.urlError'));
    return;
  }
  // Check duplicate
  const existing = Object.values(data.videos).find(v => v.videoId === videoId);
  if (existing) {
    showToast(t('videos.alreadyExists'));
    return;
  }

  const id = generateId();
  data.videos[id] = {
    videoId: videoId,
    title: '',
    thumbnail: getVideoThumbnail(videoId),
    channelTitle: '',
    addedAt: Date.now(),
    categoryId: categoryId || null,
    watched: false
  };

  // Try to get video info via oEmbed (no API key needed)
  fetchVideoInfo(id, videoId);

  saveData();
  closeModal();
  renderVideos();
  showToast(t('videos.added'));
}

async function fetchVideoInfo(id, videoId) {
  try {
    const resp = await fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=' + videoId + '&format=json');
    if (resp.ok) {
      const info = await resp.json();
      if (data.videos[id]) {
        data.videos[id].title = info.title || '';
        data.videos[id].channelTitle = info.author_name || '';
        saveData();
        renderVideos();
      }
    }
  } catch(e) { /* ignore — thumbnail still shows */ }
  // Auto-categorize if no category was manually selected
  if (data.videos[id] && !data.videos[id].categoryId) {
    autoCategorizeVideo(id, videoId);
  }
}

function renderVideos() {
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('videos-empty');
  const videos = Object.entries(data.videos)
    .map(([id, v]) => ({ id, ...v }))
    .filter(v => {
      if (activeCategory && v.categoryId !== activeCategory) return false;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        return (v.title || '').toLowerCase().includes(q) || (v.channelTitle || '').toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a, b) => b.addedAt - a.addedAt);

  renderCategoryChips('videos');

  if (videos.length === 0) {
    grid.innerHTML = '';

let watchStartTime = null;

function createPlayer(videoId) {
  const container = document.getElementById('yt-player-container');
  container.innerHTML = '<div id="yt-player-div"></div>';

  ytPlayer = new YT.Player('yt-player-div', {
    videoId: videoId,
    playerVars: {
      rel: 0,
      playsinline: 1,
      modestbranding: 1,
      autoplay: 1
    },
    events: {
      onReady: function() {
        enterPlayerFullscreen();
      },
      onStateChange: function(event) {
        if (event.data === YT.PlayerState.PLAYING) {
          watchStartTime = Date.now();
        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
          accumulateWatchTime();
        }
        if (event.data === YT.PlayerState.ENDED) {
          onVideoEnded();
        }
      }
    }
  });
}

function accumulateWatchTime() {
  if (!watchStartTime) return;
  const elapsed = Math.floor((Date.now() - watchStartTime) / 1000);
  watchStartTime = null;
  if (elapsed <= 0 || elapsed > 86400) return; // sanity check

  if (!data.watchLog) data.watchLog = { totalSeconds: 0, channels: {}, videos: {} };
  data.watchLog.totalSeconds += elapsed;

  if (currentPlayingVideoId) {
    data.watchLog.videos[currentPlayingVideoId] = (data.watchLog.videos[currentPlayingVideoId] || 0) + elapsed;
  }
  if (currentPlayingChannel) {
    data.watchLog.channels[currentPlayingChannel] = (data.watchLog.channels[currentPlayingChannel] || 0) + elapsed;
  }
  saveData();
}

function stopWatchTimer() {
  accumulateWatchTime();
  watchStartTime = null;
}

// ============== Fullscreen + Landscape ==============
function enterPlayerFullscreen() {
  const wrap = document.getElementById('player-wrap');
  if (!wrap) return;
  const rfs = wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.msRequestFullscreen;
  if (rfs) {
    rfs.call(wrap).then(() => {
      // Lock to landscape if supported
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    }).catch(() => {});
  }
}

function exitPlayerFullscreen() {
  const eFS = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (eFS) eFS.call(document).catch(() => {});
}

// Unlock orientation when exiting fullscreen
document.addEventListener('fullscreenchange', onFSChange);
document.addEventListener('webkitfullscreenchange', onFSChange);
function onFSChange() {
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fsEl && screen.orientation && screen.orientation.unlock) {
    screen.orientation.unlock();
  }
}

function fallbackCopy(text) {

  document.body.appendChild(ta);
  ta.select();

  catch(e) { showToast('Copy failed'); }
  document.body.removeChild(ta);
}

// ============== Transcript ==============
let transcriptTracks = [];
let currentTranscriptVideoId = null;

async function openTranscript(videoId, title) {
  currentTranscriptVideoId = videoId;
  const overlay = document.getElementById('transcript-overlay');
  const body = document.getElementById('transcript-body');
  const titleEl = document.getElementById('transcript-title');
  const langSel = document.getElementById('transcript-lang-select');

  overlay.style.display = 'block';
  titleEl.textContent = t('transcript.title') + ' - ' + (title || videoId);
  langSel.style.display = 'none';
  body.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div class="title">' + escHtml(t('transcript.loading')) + '</div></div>';

  try {
    const pageUrl = 'https://www.youtube.com/watch?v=' + videoId;
    const html = await corsGet(pageUrl);
    if (!html) { body.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">' + escHtml(t('transcript.error')) + '</div></div>'; return; }

    // Extract captions from ytInitialPlayerResponse
    const m = html.match(/"captions"\s*:\s*(\{"captionTracks".+?\])\s*,\s*"/s) ||
              html.match(/"captionTracks"\s*:\s*(\[.+?\])/s);
    let tracks = [];
    if (m) {
      try {
        let jsonStr = m[0].includes('"captions"') ? m[1] + '}' : m[1];
        // Try parsing the captionTracks array
        const parsed = JSON.parse(jsonStr.startsWith('[') ? jsonStr : '{"captionTracks":' + jsonStr);
        tracks = parsed.captionTracks || parsed || [];
      } catch(e) {
        // Try a different extraction
        const trackMatch = html.match(/"captionTracks"\s*:\s*(\[[\s\S]*?\])\s*[,}]/);
        if (trackMatch) {
          try { tracks = JSON.parse(trackMatch[1]); } catch(e2) {}
        }
      }
    }

    if (!tracks || tracks.length === 0) {
      body.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="title">' + escHtml(t('transcript.notFound')) + '</div></div>';
      return;
    }

    transcriptTracks = tracks;

    if (tracks.length > 1) {
      langSel.style.display = 'block';
      langSel.innerHTML = tracks.map((tr, i) =>
        '<option value="' + i + '">' + escHtml(tr.name?.simpleText || tr.languageCode || ('Track ' + (i+1))) + '</option>'
      ).join('');
    }

    await loadTranscriptTrack(0);
  } catch(e) {
    console.warn('Transcript error:', e);
    body.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">' + escHtml(t('transcript.error')) + '</div></div>';
  }
}

async function loadTranscriptTrack(index) {
  const body = document.getElementById('transcript-body');
  const track = transcriptTracks[index];
  if (!track || !track.baseUrl) {
    body.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="title">' + escHtml(t('transcript.notFound')) + '</div></div>';
    return;
  }

  body.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div class="title">' + escHtml(t('transcript.loading')) + '</div></div>';

  const xml = await corsGet(track.baseUrl);
  if (!xml) {
    body.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">' + escHtml(t('transcript.error')) + '</div></div>';
    return;
  }

  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const texts = doc.querySelectorAll('text');

  if (texts.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="title">' + escHtml(t('transcript.notFound')) + '</div></div>';
    return;
  }

  let html = '';
  texts.forEach(node => {
    const start = parseFloat(node.getAttribute('start') || '0');
    const mins = Math.floor(start / 60);
    const secs = Math.floor(start % 60);
    const timestamp = mins + ':' + String(secs).padStart(2, '0');
    const text = node.textContent.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&#39;/g, "'").replace(/&quot;/g, '"');
    html += '<div class="transcript-line">' +
      '<span class="ts" onclick="seekPlayerTo(' + start + ')">' + timestamp + '</span>' +
      '<span class="txt">' + escHtml(text) + '</span></div>';
  });
  body.innerHTML = html;
}

function onTranscriptLangChange() {
  const sel = document.getElementById('transcript-lang-select');
  loadTranscriptTrack(parseInt(sel.value) || 0);
}

function seekPlayerTo(seconds) {
  if (ytPlayer && ytPlayer.seekTo) {
    ytPlayer.seekTo(seconds, true);
    if (ytPlayer.playVideo) ytPlayer.playVideo();
  }
}

  document.getElementById('transcript-overlay').style.display = 'none';

}

// ============== CORS Proxy ==============
const CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url='
];
async function corsGet(url) {
  for (const proxy of CORS_PROXIES) {
    try {
      const resp = await fetch(proxy + encodeURIComponent(url));
      if (resp.ok) return await resp.text();
    } catch(e) { /* try next */ }
  }
  return null;
}

async function searchYouTubeChannels(query) {
  // sp=EgIQAg%3D%3D = channel filter
  const searchUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query) + '&sp=EgIQAg%3D%3D';
  const html = await corsGet(searchUrl);
  if (!html) return null;

  // Extract ytInitialData JSON
  const m = html.match(/var\s+ytInitialData\s*=\s*(\{.+?\});\s*<\/script>/s);
  if (!m) return null;

  try {
    const yt = JSON.parse(m[1]);
    const sections = yt?.contents?.twoColumnSearchResultsRenderer?.primaryContents
      ?.sectionListRenderer?.contents || [];
    const results = [];

    for (const section of sections) {
      const items = section?.itemSectionRenderer?.contents || [];
      for (const item of items) {
        const ch = item?.channelRenderer;
        if (!ch) continue;
        const channelId = ch.channelId;
        const title = ch.title?.simpleText || '';
        const thumbs = ch.thumbnail?.thumbnails || [];
        const thumbnail = thumbs.length > 0 ? thumbs[thumbs.length - 1].url : '';
        const subText = ch.subscriberCountText?.simpleText || '';
        const videoCount = ch.videoCountText?.runs?.map(r => r.text).join('') || '';
        results.push({ channelId, title, thumbnail, subText, videoCount });
      }
    }
    return results;
  } catch(e) {
    console.warn('ytInitialData parse error:', e);
    return null;
  }
}

async function doChannelSearch() {
  const input = document.getElementById('ch-search-input');
  const resultsEl = document.getElementById('ch-search-results');

  resultsEl.innerHTML = '<div class="ch-search-loading"><div class="spinner">🔄</div><div>' + escHtml(t('channels.searching')) + '</div></div>';

    resultsEl.innerHTML = '<div class="ch-search-empty">' + escHtml(t(results === null ? 'channels.searchError' : 'channels.noResults')) + '</div>';
    return;

  resultsEl.innerHTML = results.map(ch => {

  }).join('');
}

async function addChannelFromUrl(url, categoryId) {
  const info = parseYouTubeChannelInfo(url);
  if (!info) {
    const error = document.getElementById('add-channel-error');
    if (error) { error.textContent = t('channels.urlError'); error.style.display = 'block'; }
    return;
  }

  const loadingEl = document.getElementById('add-channel-loading');
  const errorEl = document.getElementById('add-channel-error');
  if (errorEl) errorEl.style.display = 'none';
  if (loadingEl) loadingEl.style.display = 'block';

  try {
    // Resolve channel ID if needed
    let channelId;
    if (info.type === 'id') {
      channelId = info.value;
    } else {
      channelId = await resolveChannelId(info);
    }

    if (!channelId) {
      if (loadingEl) loadingEl.style.display = 'none';
      showToast(t('channels.fetchError'));
      return;
    }

    // Check duplicate
    const existing = Object.values(data.channels).find(c => c.channelId === channelId);
    if (existing) {
      if (loadingEl) loadingEl.style.display = 'none';
      showToast(t('channels.alreadyExists'));
      return;
    }

    // Fetch RSS to get channel name
    const rssData = await fetchChannelRSS(channelId);
    const title = rssData ? rssData.channelTitle : channelId;

    const id = generateId();
    data.channels[id] = {
      channelId: channelId,
      title: title,
      thumbnail: '',
      addedAt: Date.now(),
      categoryId: categoryId || null
    };

    saveData();
    closeModal();
    renderChannels();
    showToast(t('channels.added'));

    // Auto-categorize from first video's genre
    if (!categoryId && rssData && rssData.videos.length > 0) {
      fetchVideoGenre(rssData.videos[0].videoId).then(genre => {
        const catId = mapGenreToCategory(genre);
        if (catId && data.channels[id] && !data.channels[id].categoryId) {
          data.channels[id].categoryId = catId;
          saveData();
          renderChannels();
        }
      }).catch(() => {});
    }
  } catch(e) {
    console.warn('addChannel error:', e);
    if (loadingEl) loadingEl.style.display = 'none';
    showToast(t('channels.fetchError'));
  }
}

async function resolveChannelId(info) {
  const ytUrl = info.type === 'handle'
    ? 'https://www.youtube.com/@' + info.value
    : 'https://www.youtube.com/c/' + info.value;
  const html = await corsGet(ytUrl);
  if (!html) return null;
  // externalId is the most reliable channel owner ID
  let m = html.match(/"externalId":"(UC[a-zA-Z0-9_-]+)"/);
  if (m) return m[1];
  m = html.match(/"channelId":"(UC[a-zA-Z0-9_-]+)"/);
  if (m) return m[1];
  m = html.match(/channel\/(UC[a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  return null;
}

async function fetchChannelRSS(channelId) {
  const rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId;
  const xml = await corsGet(rssUrl);
  if (!xml) return null;

  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  if (doc.querySelector('parsererror')) return null;

  const ns = 'http://www.w3.org/2005/Atom';
  const ytNs = 'http://www.youtube.com/xml/schemas/2015';
  const mediaNs = 'http://search.yahoo.com/mrss/';

  const channelTitle = doc.querySelector('feed > title')?.textContent || '';

  const entries = doc.querySelectorAll('entry');
  const videos = [];
  entries.forEach(entry => {
    const videoId = entry.getElementsByTagNameNS(ytNs, 'videoId')[0]?.textContent;
    const title = entry.querySelector('title')?.textContent || '';
    const mediaGroup = entry.getElementsByTagNameNS(mediaNs, 'group')[0];
    const thumbnail = mediaGroup
      ? (mediaGroup.getElementsByTagNameNS(mediaNs, 'thumbnail')[0]?.getAttribute('url') || getVideoThumbnail(videoId || ''))
      : getVideoThumbnail(videoId || '');
    const published = entry.querySelector('published')?.textContent || '';
    if (videoId) {
      videos.push({ videoId, title, thumbnail, publishedAt: published });
    }
  });

  return { channelTitle, videos };
}

// ============== Channel Scraping (Popular Videos) ==============
async function fetchChannelPopularVideos(channelId) {
  const url = 'https://www.youtube.com/channel/' + channelId + '/videos?view=0&sort=p';
  const html = await corsGet(url);
  if (!html) return null;

  const m = html.match(/var\s+ytInitialData\s*=\s*(\{.+?\});\s*<\/script>/s);
  if (!m) return null;

  try {
    const yt = JSON.parse(m[1]);
    // Navigate to video items
    const tabs = yt?.contents?.twoColumnBrowseResultsRenderer?.tabs || [];
    let items = [];
    for (const tab of tabs) {
      const tabContent = tab?.tabRenderer?.content;
      if (!tabContent) continue;
      const richGrid = tabContent?.richGridRenderer?.contents || [];
      for (const gridItem of richGrid) {
        const video = gridItem?.richItemRenderer?.content?.videoRenderer;
        if (!video) continue;
        const videoId = video.videoId;
        if (!videoId) continue;

        const title = video.title?.runs?.map(r => r.text).join('') || '';
        const thumbnail = video.thumbnail?.thumbnails?.slice(-1)[0]?.url || getVideoThumbnail(videoId);

        // View count
        const viewText = video.viewCountText?.simpleText || video.viewCountText?.runs?.map(r => r.text).join('') || '';

        // Duration
        const durationText = video.lengthText?.simpleText || '';
        const durationSeconds = parseDuration(durationText);

        // Check if Shorts
        const isShorts = (
          durationSeconds > 0 && durationSeconds < 61
        ) || (
          video.thumbnailOverlays?.some(o =>
            o?.thumbnailOverlayTimeStatusRenderer?.style === 'SHORTS'
          )
        ) || (
          video.navigationEndpoint?.commandMetadata?.webCommandMetadata?.url?.includes('/shorts/')
        );

        if (!isShorts) {
          items.push({ videoId, title, thumbnail, viewText, durationText, durationSeconds });
        }
      }
      if (items.length > 0) break;
    }

    // Extract channel title
    const channelTitle = yt?.metadata?.channelMetadataRenderer?.title || '';
    return { channelTitle, videos: items };
  } catch(e) {
    console.warn('Channel scraping parse error:', e);
    return null;
  }
}

function parseDuration(text) {
  if (!text) return 0;
  const parts = text.split(':').map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return parts[0] || 0;
}

async function openChannelVideos(id) {
  const ch = data.channels[id];
  if (!ch) return;

  const overlay = document.getElementById('channel-videos-overlay');
  const grid = document.getElementById('channel-video-grid');
  const loading = document.getElementById('channel-videos-loading');
  const title = document.getElementById('channel-videos-title');

  overlay.style.display = 'block';
  title.textContent = ch.title || ch.channelId;
  grid.innerHTML = '';
  loading.style.display = 'block';

  try {
    // Try scraping popular videos first
    let videoData = await fetchChannelPopularVideos(ch.channelId);
    let isPopular = true;

    // Fallback to RSS if scraping fails
    if (!videoData || videoData.videos.length === 0) {
      const rssData = await fetchChannelRSS(ch.channelId);
      if (rssData && rssData.videos.length > 0) {
        videoData = { channelTitle: rssData.channelTitle, videos: rssData.videos.map(v => ({ ...v, viewText: '', durationText: '' })) };
        isPopular = false;
      }

      grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="title">No videos found</div></div>';
      return;
    }

    if (videoData.channelTitle && videoData.channelTitle !== ch.title) {
      data.channels[id].title = videoData.channelTitle;
      saveData();
      title.textContent = videoData.channelTitle;

    let gridHtml = '<div style="font-size:12px;color:var(--text-light);margin-bottom:8px;grid-column:1/-1;">' + escHtml(labelText) + '</div>';

        (alreadySaved ? '<div class="watched-badge">' + escHtml(t('videos.saved')) + '</div>' : '') +
        '</div>' +

        '<div class="card-title">' + vTitle + '</div>' +

        '<button onclick="event.stopPropagation();saveChannelVideoToMyVideos(\'' + escAttr(v.videoId) + '\',\'' +
        escAttr(v.title || '') + '\',\'' + escAttr(ch.title || '') + '\')">' +

function formatWatchTime(totalSecs) {
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  let parts = [];
  if (h > 0) parts.push(h + t('stats.hours'));
  if (m > 0) parts.push(m + t('stats.minutes'));
  if (h === 0) parts.push(s + t('stats.seconds'));
  return parts.join(' ');
}

    '<div style="text-align:center;padding:16px 0;">' +
    '<div style="font-size:48px;margin-bottom:8px;">👤</div>' +
    '<div style="font-size:16px;font-weight:700;">' + escHtml(currentUser.displayName || '') + '</div>' +

    '</div>' +
    '<div class="modal-actions">' +

    '<button class="btn btn-danger" onclick="closeModal();signOutUser()">' + escHtml(t('settings.logout')) + '</button>' +
    '</div>';

}

// ============== Sync ==============
function debouncedSync() {
  if (!currentUser || !db) return;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncToCloud(); }, 3000);
}

async function syncToCloud() {
  if (!currentUser || !db || isSyncing) return;
  isSyncing = true;
  updateSyncStatus('syncing');
  try {
    const uid = currentUser.uid;
    const userRef = db.collection('mytube-users').doc(uid);
    const now = firebase.firestore.FieldValue.serverTimestamp();
    await userRef.set({
      videos: data.videos || {},
      channels: data.channels || {},
      categories: data.categories || {},
      settings: data.settings || {},
      watchLog: data.watchLog || { totalSeconds: 0, channels: {}, videos: {} },
      lastSync: now
    }, { merge: true });

    lastSyncTime = Date.now();
    localStorage.setItem('myTubeLastSync', String(lastSyncTime));
    updateSyncStatus('synced');
  } catch (err) {
    console.warn('syncToCloud error:', err);
    updateSyncStatus('error');
  } finally {
    isSyncing = false;
  }
}

async function syncFromCloud() {
  if (!currentUser || !db) return;
  updateSyncStatus('syncing');
  try {
    const uid = currentUser.uid;
    const doc = await db.collection('mytube-users').doc(uid).get();
    if (doc.exists) {
      const d = doc.data();
      if (d.videos) data.videos = d.videos;
      if (d.channels) data.channels = d.channels;
      if (d.categories) data.categories = d.categories;
      if (d.settings) data.settings = { ...data.settings, ...d.settings };
      if (d.watchLog) data.watchLog = d.watchLog;
    }
    localStorage.setItem('myTube', JSON.stringify(data));
    lastSyncTime = Date.now();
    localStorage.setItem('myTubeLastSync', String(lastSyncTime));
    updateSyncStatus('synced');
  } catch (err) {
    console.warn('syncFromCloud error:', err);
    updateSyncStatus('error');
  }
}

async function syncData() {
  if (!currentUser || !db) return;
  updateSyncStatus('syncing');
  try {
    const uid = currentUser.uid;
    const doc = await db.collection('mytube-users').doc(uid).get();
    const cloudExists = doc.exists && doc.data().lastSync;
    const localHasData = Object.keys(data.videos).length > 0 || Object.keys(data.channels).length > 0;

    if (!cloudExists && localHasData) await syncToCloud();
    else if (cloudExists && !localHasData) { await syncFromCloud(); renderAll(); }
    else if (cloudExists && localHasData) {
      if (lastSyncTime) await syncToCloud();
      else {
        // First sync — prefer cloud
        await syncFromCloud();
        renderAll();
      }
    } else updateSyncStatus('synced');
  } catch (err) {
    console.warn('syncData error:', err);
    updateSyncStatus('error');
  }
}

function updateSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const icon = el.querySelector('.sync-icon');
  const text = el.querySelector('.sync-text');
  if (status === 'hidden') {
    el.classList.remove('show');
    return;
  }
  el.classList.add('show');
  if (status === 'syncing') {
    icon.textContent = '🔄';
    icon.classList.add('spinner');
    text.textContent = t('sync.syncing');
  } else if (status === 'synced') {
    icon.textContent = '✓';
    icon.classList.remove('spinner');
    text.textContent = t('sync.synced');
    setTimeout(() => { el.classList.remove('show'); }, 3000);
  } else if (status === 'error') {
    icon.textContent = '⚠';
    icon.classList.remove('spinner');
    text.textContent = t('sync.error');
  }
}

// ============== Login Banner ==============
function renderLoginBanner() {
  const area = document.getElementById('login-banner-area');
  if (!area) return;
  if (currentUser) {
    area.innerHTML = '';
    return;
  }
  area.innerHTML = '<div class="login-banner">' +
    '<div class="info">' +
    '<div class="title">' + escHtml(t('auth.loginBanner')) + '</div>' +
    '<div class="desc">' + escHtml(t('auth.loginBannerDesc')) + '</div>' +
    '</div>' +
    '<button class="btn btn-primary btn-sm" onclick="signInWithGoogle()">Google</button>' +
    '</div>';
}

// ============== PWA ==============
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('myTubePWADismissed')) {
    document.getElementById('pwa-install-banner').classList.add('show');
  }
});
window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install-banner').classList.remove('show');
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
}
function dismissInstallBanner() {
  document.getElementById('pwa-install-banner').classList.remove('show');
  localStorage.setItem('myTubePWADismissed', 'true');
}
function showIOSInstallBanner() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem('myTubeIOSDismissed')) {
    setTimeout(() => { document.getElementById('pwa-ios-banner').classList.add('show'); }, 2000);
  }
}
function dismissIOSBanner() {
  document.getElementById('pwa-ios-banner').classList.remove('show');
  localStorage.setItem('myTubeIOSDismissed', 'true');
}

// ============== Render All ==============
function renderAll() {
  renderVideos();
  renderChannels();
  renderLoginBanner();
}

// ============== Init ==============
function init() {
  loadData();

  // Apply saved language
  if (data.settings.language && SUPPORTED_LANGS.includes(data.settings.language)) {
    currentLang = data.settings.language;
  }

  lastSyncTime = parseInt(localStorage.getItem('myTubeLastSync')) || null;
  applyStaticTranslations();

  // Dark mode
  if (localStorage.getItem('myTubeDark') === 'true') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  renderAll();

  // Firebase auth
  if (auth) {
    auth.getRedirectResult().catch(err => {
      console.warn('Redirect sign-in error:', err);
      showToast('로그인 실패: ' + (err.message || err.code));
    });
    auth.onAuthStateChanged(onAuthChanged);
  } else renderLoginBanner();

  // Load YouTube IFrame API
  loadYouTubeAPI();

  // iOS PWA banner
  showIOSInstallBanner();

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

init();
</script>
